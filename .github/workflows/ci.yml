name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests + coverage (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run pytest with coverage
        run: |
          pytest --cov=frappe_fixture_normalize \
                 --cov-report=term-missing \
                 --cov-report=xml \
                 --cov-fail-under=95

      - name: Upload coverage to Codecov
        if: matrix.python == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration:
    name: Frappe integration (bench run-tests)
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: travis
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h localhost -u root -ptravis"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis-cache:
        image: redis:7
        ports:
          - 13000:6379
      redis-queue:
        image: redis:7
        ports:
          - 11000:6379

    steps:
      - uses: actions/checkout@v4
        with:
          path: app

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf libcups2-dev python3-dev mariadb-client

      - name: Install bench
        run: |
          python -m pip install --upgrade pip
          pip install frappe-bench

      - name: Bootstrap bench + site
        run: |
          bench init --skip-redis-config-generation --frappe-branch version-16 --skip-assets test-bench
          cd test-bench
          mkdir -p sites
          cat > sites/common_site_config.json <<JSON
          {
            "db_host": "127.0.0.1",
            "db_port": 3306,
            "redis_cache": "redis://localhost:13000",
            "redis_queue": "redis://localhost:11000",
            "redis_socketio": "redis://localhost:13000"
          }
          JSON
          bench new-site test_site.localhost \
            --no-mariadb-socket \
            --db-root-username root \
            --db-root-password travis \
            --admin-password admin \
            --install-app frappe
          ln -sfn $GITHUB_WORKSPACE/app apps/frappe_fixture_normalize
          ./env/bin/pip install -e apps/frappe_fixture_normalize
          echo "frappe_fixture_normalize" >> sites/apps.txt
          bench --site test_site.localhost install-app frappe_fixture_normalize

      - name: Run frappe integration tests
        run: |
          cd test-bench
          bench --site test_site.localhost run-tests --app frappe_fixture_normalize

  e2e:
    name: End-to-end shell scenarios
    runs-on: ubuntu-latest
    needs: integration
    if: false  # Enable once bench environment can be reproduced in CI; meanwhile run locally.
    steps:
      - run: echo "E2E suite runs locally; see tests/e2e/README.md"
